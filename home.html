<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>POST Test</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: #111;
            color: #eee;
        }

        .container {
            max-width: 500px;
            margin: auto;
            padding: 20px;
            background: #222;
            border-radius: 8px;
        }

        input, textarea, button {
            width: 100%;
            margin-top: 10px;
            padding: 10px;
            border-radius: 5px;
            border: none;
            font-size: 14px;
        }

        button {
            background: #4CAF50;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }

        pre {
            background: #000;
            padding: 10px;
            margin-top: 15px;
            border-radius: 5px;
            overflow-x: auto;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Aplicação</h2>

    <label>Message</label>
    <textarea id="message"></textarea>

    <button onclick="sendPost()">Send POST</button>

    <h3>Response</h3>
    <pre id="output">No response yet</pre>
</div>

<script>
async function sendPost() {
    const url = "http://localhost:8080/test";
    const message = document.getElementById("message").value;

    try {
        const res = await fetch(url, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: message,
                time: new Date().toISOString()
            })
        });

        const text = await res.text();

        document.getElementById("output").textContent = text;

    } catch (err) {
        document.getElementById("output").textContent =
            "Error: " + err.message;
    }
}
</script>

</body>
</html>
